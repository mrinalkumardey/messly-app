<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messly App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ff8c42; --accent: #ff5f6d; --bg: #f8f9fa; --text: #2d3436; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 20px; }

        /* Navigation & Header */
        .header-box { position: sticky; top: 0; background: rgba(248, 249, 250, 0.9); backdrop-filter: blur(10px); z-index: 1000; padding: 15px 0; }
        .nav-custom { background: #e9ecef; border-radius: 50px; padding: 6px; display: flex; gap: 5px; }
        .nav-custom button { border-radius: 50px; border: none; padding: 12px; flex: 1; background: none; font-weight: 700; color: #adb5bd; transition: 0.4s; }
        .nav-custom button.active { background: white !important; color: var(--primary) !important; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* The Glass Card */
        .glass-card { 
            background: white; border-radius: 35px; padding: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02);
            margin-bottom: 30px; position: relative;
        }

        /* Avatar Selection - SCROLLBAR FIXED HERE */
        .avatar-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 10px 5px 15px 5px; }
        .avatar-scroll::-webkit-scrollbar { height: 8px; }
        .avatar-scroll::-webkit-scrollbar-track { background: #f1f3f5; border-radius: 10px; }
        .avatar-scroll::-webkit-scrollbar-thumb { background: #ff8c42; border-radius: 10px; border: 2px solid #f1f3f5; }
        
        .avatar-item { 
            flex: 0 0 65px; height: 85px; border-radius: 20px; background: #f1f3f5; 
            display: flex; align-items: center; justify-content: center; flex-direction: column; 
            cursor: pointer; transition: 0.3s; border: 2px solid transparent;
        }
        .avatar-item b { font-size: 1.4rem; color: #adb5bd; }
        .avatar-item span { font-size: 0.65rem; font-weight: 700; color: #adb5bd; }
        .avatar-item.selected { 
            background: var(--primary); transform: scale(1.1) translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 140, 66, 0.3); border-color: var(--primary);
        }
        .avatar-item.selected b, .avatar-item.selected span { color: white; }

        /* Modern Input Groups */
        .input-group-modern { background: #f8f9fa; border-radius: 20px; padding: 12px 18px; margin-bottom: 15px; border: 2px solid transparent; transition: 0.3s; }
        .input-group-modern:focus-within { border-color: var(--primary); background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.02); }
        .input-group-modern label { display: block; font-size: 0.7rem; font-weight: 700; color: #adb5bd; text-transform: uppercase; margin-bottom: 4px; }
        .input-group-modern input { width: 100%; border: none; background: transparent; font-size: 1.1rem; font-weight: 600; outline: none; }

        /* The Glow Button */
        .btn-glow { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white; border: none; border-radius: 22px; padding: 18px; width: 100%;
            font-weight: 800; font-size: 1.1rem; box-shadow: 0 12px 25px rgba(255, 95, 109, 0.3);
            transition: 0.3s; margin-top: 10px;
        }
        .btn-glow:active { transform: scale(0.96); }
        .btn-glow:disabled { opacity: 0.7; transform: none; box-shadow: none; }

        /* Custom Calendar Icon */
        #filter-date::-webkit-calendar-picker-indicator {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff8c42"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>');
            cursor: pointer; width: 18px; height: 18px;
        }

        /* FLEX-GRID HISTORY LAYOUT */
        .history-header { display: flex; padding: 0 18px 10px 18px; font-size: 0.65rem; font-weight: 800; color: #adb5bd; text-transform: uppercase; letter-spacing: 1px; }
        .transaction-card { background: white; border-radius: 18px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.01); transition: transform 0.2s; }
        .col-date { width: 85px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #9b7e6b; }
        .col-user { width: 70px; font-weight: 700; color: var(--primary); font-size: 0.9rem; }
        .col-item { flex-grow: 1; padding: 0 10px; color: #432818; line-height: 1.2; font-size: 0.95rem; }
        .col-price { width: 95px; text-align: right; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: #2d3436; font-size: 0.95rem; }

        /* Angled Attendance Headers */
        .table-attendance th.name-header { height: 75px; vertical-align: bottom; padding-bottom: 15px; }
        .table-attendance th.name-header > div { transform: rotate(-45deg) translate(-12px, 12px); transform-origin: bottom left; font-size: 0.7rem; color: #adb5bd; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; width: 30px; display: inline-block; }

        /* Pagination & Lists */
        .hidden-page { display: none !important; }
        .pagination-pills { display: flex; justify-content: center; gap: 8px; margin: 25px 0; }
        .page-num { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: white; border: 1px solid #dee2e6; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .page-num.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* SETTLEMENT LAYOUT */
        .balance-box { display: flex; justify-content: space-between; align-items: center; padding: 18px; border-radius: 22px; margin-bottom: 12px; background: white; border: 1px solid #f1f3f5; }
        .pos { border-left: 6px solid #51cf66; } 
        .neg { border-left: 6px solid #ff6b6b; } 
        .neutral { border-left: 6px solid #dee2e6; } 
        
        /* SweetAlert Customizations */
        .swal2-popup { font-family: 'Outfit', sans-serif !important; border-radius: 24px !important; }
        .swal2-confirm { border-radius: 12px !important; padding: 12px 24px !important; font-weight: 700 !important; }
    </style>
</head>
<body>

<div class="container py-2" style="max-width: 500px;">
    <div class="header-box px-2">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="fw-bold m-0" style="letter-spacing: -1px;">Messly.</h4>
            <select id="month-select" class="form-select form-select-sm w-auto border-0 bg-light fw-bold" onchange="fetchData()"></select>
        </div>
        <div class="nav-custom mt-3">
            <button id="btn-expense" class="active" onclick="showPage('expense')">Pay</button>
            <button id="btn-attendance" onclick="showPage('attendance')">Eat</button>
            <button id="btn-split" onclick="showPage('split')">Settle</button>
        </div>
    </div>

    <div id="page-expense" class="page-content mt-3">
        <div class="glass-card">
            <label class="small fw-bold text-muted mb-3 d-block ms-1">WHO PAID?</label>
            <div class="avatar-scroll mb-4" id="payer-avatars">
                {% for u in users %}
                <div class="avatar-item" onclick="selectPayer('{{u}}', this)">
                    <b>{{ u[0] }}</b><span>{{ u }}</span>
                </div>
                {% endfor %}
            </div>
            <input type="hidden" id="new-exp-payer">

            <div class="input-group-modern">
                <label>What did we get?</label>
                <input type="text" id="new-exp-item" placeholder="e.g. Rice, Gas, Vegetables...">
            </div>

            <div class="row g-3">
                <div class="col-7">
                    <div class="input-group-modern">
                        <label>Amount (₹)</label>
                        <input type="number" id="new-exp-amount" placeholder="0.00">
                    </div>
                </div>
                <div class="col-5">
                    <div class="input-group-modern">
                        <label>Date</label>
                        <input type="date" id="new-exp-date">
                    </div>
                </div>
            </div>
            <button class="btn-glow" id="btn-submit-exp" onclick="saveEntry('Expenses')">LOG EXPENSE</button>
        </div>

        <div class="d-flex justify-content-between px-2 mb-3 align-items-center">
            <h6 class="fw-bold m-0 text-muted" style="letter-spacing: 1px; font-size: 0.8rem;">ACTIVITY LOG</h6>
            <input type="date" id="filter-date" class="form-control form-control-sm w-auto border-0 bg-white shadow-sm" style="border-radius:10px; font-family: 'JetBrains Mono';" onchange="fetchData()">
        </div>
        
        <div id="list-expense"></div>
        <div id="pagination-controls" class="pagination-pills mb-4"></div>
    </div>

    <div id="page-attendance" class="page-content hidden-page mt-3">
        <div class="glass-card">
            <input type="date" id="new-att-date" class="form-control mb-4 border-0 bg-light p-3 rounded-4 fw-bold text-center" style="font-family: 'JetBrains Mono';">
            {% for u in users %}
            <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
                <span class="fw-bold fs-5">{{u}}</span>
                <div class="form-check form-switch"><input class="form-check-input att-check" type="checkbox" id="att_{{u}}" style="width: 3em; height: 1.5em;"></div>
            </div>
            {% endfor %}
            <button class="btn-glow mt-4" id="btn-submit-att" onclick="saveEntry('Attendance')">SAVE ATTENDANCE</button>
        </div>
        <div id="list-attendance"></div>
    </div>

    <div id="page-split" class="page-content hidden-page mt-3">
        <div id="split-summary"></div>
        <div id="split-list"></div>
    </div>

    <div class="text-center mt-5 mb-4">
        <small class="text-muted fw-bold" style="letter-spacing: 0.5px; font-size: 0.75rem;">
            Developed by <a href="https://www.linkedin.com/in/mrinal-kumar-dey/" target="_blank" style="color: var(--primary); text-decoration: none;">Mrinal Kumar</a>
        </small>
    </div>
</div>

<script>
    const USERS = {{ users|tojson }};
    let allExpenses = [];
    let currentPage = 1;

    // Set default dates
    document.getElementById('new-exp-date').valueAsDate = new Date();
    document.getElementById('new-att-date').valueAsDate = new Date();

    // ---- Dynamic Month Generator ----
    function initMonths() {
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const select = document.getElementById('month-select');
        select.innerHTML = '';
        const currentMonthIdx = new Date().getMonth();
        
        monthNames.forEach((m, idx) => {
            let opt = document.createElement('option');
            opt.value = m;
            opt.textContent = m;
            if (idx === currentMonthIdx) opt.selected = true; // Auto-select current month
            select.appendChild(opt);
        });
    }

    // Initialize months before fetching data
    initMonths();

    // Visual selection for avatars
    function selectPayer(name, el) {
        document.querySelectorAll('.avatar-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('new-exp-payer').value = name;
        if (window.navigator.vibrate) window.navigator.vibrate(10);
    }

    function showPage(p) {
        document.querySelectorAll('.page-content').forEach(e => e.classList.add('hidden-page'));
        document.querySelectorAll('.nav-custom button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+p).classList.remove('hidden-page');
        document.getElementById('btn-'+p).classList.add('active');
        fetchData();
    }

    async function fetchData() {
        const month = document.getElementById('month-select').value;
        const filter_date = document.getElementById('filter-date').value;
        
        try {
            const res = await fetch('/get_data', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({month, filter_date}) 
            });
            const data = await res.json();
            
            if(res.ok) {
                allExpenses = data.expenses;
                renderExpenses(1);
                renderAttendance(data.attendance);
                renderSplit(data);
            }
        } catch (e) { console.error("Fetch failed", e); }
    }

    function renderExpenses(p) {
        currentPage = p;
        const start = (p - 1) * 20;
        const items = allExpenses.slice(start, start + 20);
        
        let h = `<div class="history-header">
            <div class="col-date">Date</div><div class="col-user">By</div>
            <div class="col-item">Item</div><div class="col-price">₹ Amount</div>
        </div>`;

        if (items.length === 0) h += `<div class="text-center py-4 text-muted small bg-white rounded-4 shadow-sm">No transactions found.</div>`;

        items.forEach(r => {
            h += `<div class="transaction-card">
                <div class="col-date">${r.Date}</div><div class="col-user text-truncate">${r.Payer}</div>
                <div class="col-item">${r.Item}</div><div class="col-price">${parseFloat(r.Amount).toLocaleString('en-IN')}</div>
            </div>`;
        });
        document.getElementById('list-expense').innerHTML = h;
        renderPagination();
    }

    function renderPagination() {
        const total = Math.ceil(allExpenses.length / 20);
        let h = '';
        for(let i=1; i<=total; i++) h += `<div class="page-num ${i===currentPage?'active':''}" onclick="renderExpenses(${i})">${i}</div>`;
        document.getElementById('pagination-controls').innerHTML = (total > 1) ? h : '';
    }

    function renderAttendance(list) {
        let h = '<div class="glass-card p-0 overflow-hidden"><table class="table table-sm text-center mb-0 table-attendance"><thead><tr class="table-light"><th class="py-3 align-bottom text-start ps-3 text-muted small" style="width: 75px;">DATE</th>';
        USERS.forEach(u => h += `<th class="name-header"><div>${u}</div></th>`);
        h += '</tr></thead><tbody>';
        list.slice(0, 15).forEach(r => {
            h += `<tr><td class='text-start ps-3 py-2 small fw-bold text-muted'>${r.Date}</td>`;
            USERS.forEach(u => h += `<td class="py-2 fs-6">${r[u] ? '✅' : '<span style="opacity:0.2">❌</span>'}</td>`);
            h += '</tr>';
        });
        document.getElementById('list-attendance').innerHTML = h + '</tbody></table></div>';
    }

    function renderSplit(data) {
        let totalCollect = 0;
        let totalPayout = 0;
        
        data.settlement.forEach(s => {
            if (s.balance < 0) totalCollect += Math.abs(s.balance);
            else if (s.balance > 0) totalPayout += s.balance;
        });

        let h = `
        <div class='glass-card mb-4 d-flex justify-content-around text-center p-4'>
            <div><h3 class='fw-bold m-0' style="font-family: 'JetBrains Mono';">₹${data.total_spent}</h3><small class='text-muted fw-bold' style="letter-spacing:1px">TOTAL SPENT</small></div>
            <div class='border-end'></div>
            <div><h3 class='fw-bold m-0 text-primary' style="font-family: 'JetBrains Mono';">₹${data.unit_cost}</h3><small class='text-muted fw-bold' style="letter-spacing:1px">PER MEAL</small></div>
        </div>`;

        h += `
        <h6 class="fw-bold px-2 mb-3 text-muted" style="letter-spacing: 1px; font-size: 0.8rem;">MESS ACCOUNT SETTLEMENT</h6>
        <div class="glass-card mb-4 p-3 d-flex justify-content-between align-items-center" style="border-radius: 20px;">
            <div class="text-center w-50 border-end">
                <small class="text-danger fw-bold">TO COLLECT</small><br>
                <b style="font-family: 'JetBrains Mono'; font-size: 1.2rem; color: #ff6b6b;">₹${totalCollect.toFixed(2)}</b>
            </div>
            <div class="text-center w-50">
                <small class="text-success fw-bold">TO PAYOUT</small><br>
                <b style="font-family: 'JetBrains Mono'; font-size: 1.2rem; color: #51cf66;">₹${totalPayout.toFixed(2)}</b>
            </div>
        </div>
        <h6 class="fw-bold px-2 mb-3 text-muted" style="letter-spacing: 1px; font-size: 0.8rem;">WHO PAYS WHAT</h6>`;

        let l = '';
        data.settlement.forEach(s => {
            let statusText, amountStr, colorClass, borderClass;

            if (s.balance < 0) {
                statusText = "NEEDS TO PAY"; amountStr = `₹${Math.abs(s.balance).toFixed(2)}`; colorClass = "text-danger"; borderClass = "neg";
            } else if (s.balance > 0) {
                statusText = "GETS BACK"; amountStr = `₹${s.balance.toFixed(2)}`; colorClass = "text-success"; borderClass = "pos";
            } else {
                statusText = "SETTLED"; amountStr = `₹0.00`; colorClass = "text-muted"; borderClass = "neutral";
            }

            l += `
            <div class="balance-box shadow-sm ${borderClass}">
                <div class="d-flex align-items-center gap-3">
                    <div class="bg-light rounded-circle d-flex align-items-center justify-content-center fw-bold fs-5" style="width: 45px; height: 45px; color: #adb5bd;">${s.name[0]}</div>
                    <div><b class="fs-5">${s.name}</b><br><small class="text-muted fw-bold">${s.units} Meals • Paid ₹${s.paid}</small></div>
                </div>
                <div class="text-end">
                    <small class="${colorClass} fw-bold" style="font-size: 0.65rem; letter-spacing: 0.5px;">${statusText}</small><br>
                    <b style="font-size:1.3rem; font-family: 'JetBrains Mono';" class="${colorClass}">${amountStr}</b>
                </div>
            </div>`;
        });

        document.getElementById('split-summary').innerHTML = h;
        document.getElementById('split-list').innerHTML = l;
    }

    // ---- FUNNY POPUPS & NO TIMERS ----
    async function saveEntry(type) {
        const month = document.getElementById('month-select').value;
        const btnId = type === 'Expenses' ? 'btn-submit-exp' : 'btn-submit-att';
        const btn = document.getElementById(btnId);
        
        let payload = { month, type };

        if (type === 'Expenses') {
            payload.payer = document.getElementById('new-exp-payer').value;
            payload.item = document.getElementById('new-exp-item').value;
            payload.amount = document.getElementById('new-exp-amount').value;
            payload.date = document.getElementById('new-exp-date').value;

            if (!payload.payer || !payload.item || !payload.amount) {
                Swal.fire({ 
                    icon: 'warning', 
                    title: 'Hold your horses! 🐎', 
                    text: "You missed some details. We ain't mind readers!", 
                    confirmButtonColor: '#ff8c42',
                    confirmButtonText: 'My bad!'
                });
                return;
            }
        } else {
            payload.date = document.getElementById('new-att-date').value;
            payload.att = {}; USERS.forEach(u => payload.att[u] = document.getElementById('att_'+u).checked);
        }

        btn.disabled = true;
        const oldText = btn.innerText;
        btn.innerText = "SAVING...";

        try {
            const res = await fetch('/add_entry', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            if (res.ok) {
                
                // Different funny popups depending on what they just did
                let popupProps = {};
                if (type === 'Expenses') {
                    popupProps = {
                        title: 'Cha-Ching! 💸',
                        text: 'Your wallet cries, but the mess survives. Expense logged!',
                        confirmButtonText: 'I accept my poverty'
                    };
                } else {
                    popupProps = {
                        title: 'Belly Filled! 🍽️',
                        text: 'Attendance saved. Hope the food was worth it!',
                        confirmButtonText: 'Burp. OK.'
                    };
                }

                // Show popup WITHOUT the timer so it waits for them
                Swal.fire({ 
                    ...popupProps,
                    icon: 'success', 
                    confirmButtonColor: '#ff8c42', 
                    background: '#fffaf5' 
                }).then(() => {
                    // Reset fields only after they click OK
                    if (type === 'Expenses') {
                        document.getElementById('new-exp-item').value = ""; document.getElementById('new-exp-amount').value = "";
                        document.querySelectorAll('.avatar-item').forEach(i => i.classList.remove('selected'));
                        document.getElementById('new-exp-payer').value = "";
                    }
                    fetchData();
                });
            }
        } catch (err) { 
            Swal.fire({ title: 'Yikes!', text: 'Could not connect. Is the server running?', icon: 'error' }); 
        } finally { 
            btn.disabled = false; btn.innerText = oldText; 
        }
    }
    
    showPage('expense');
</script>
</body>
</html>
